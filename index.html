<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Titan+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <script src="./app.js" defer></script>
    <title>P1</title>
</head>
<body>

    <header class="header">
        <div class="header-inner">
            <h1 class="site-title">Rick & <span>Morty</span></h1>
            <p class="site-sub">Explore os personagens</p>
        </div>
    </header>

    <main class="container">

        <div class="search-row">
            <input type="text" id="busca" placeholder="Digite o nome do personagem">
            <button id="btn-buscar">Pesquisar</button>
        </div>

        <div id="stats" class="stats"></div>
        <div id="msg-erro" class="msg-erro" style="display:none;"></div>

        <div id="grid" class="grid" style="display:none;">

            <!-- Card 1 -->
            <div class="card" id="card-0">
                <img class="card-img" id="card-0-img" src="" alt="">
                <div class="card-body">
                    <div class="card-name" id="card-0-nome"></div>
                    <div class="card-status">
                        <span class="dot" id="card-0-dot"></span>
                        <span id="card-0-status"></span>
                    </div>
                    <div class="card-meta" id="card-0-meta"></div>
                    <div class="card-meta" id="card-0-local"></div>
                    <div class="btn-learn">
                        <button id="card-0-btn">LEARN MORE</button>
                    </div>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="card" id="card-1">
                <img class="card-img" id="card-1-img" src="" alt="">
                <div class="card-body">
                    <div class="card-name" id="card-1-nome"></div>
                    <div class="card-status">
                        <span class="dot" id="card-1-dot"></span>
                        <span id="card-1-status"></span>
                    </div>
                    <div class="card-meta" id="card-1-meta"></div>
                    <div class="card-meta" id="card-1-local"></div>
                    <div class="btn-learn">
                        <button id="card-1-btn">LEARN MORE</button>
                    </div>
                </div>
            </div>

            <!-- Card 3 -->
            <div class="card" id="card-2">
                <img class="card-img" id="card-2-img" src="" alt="">
                <div class="card-body">
                    <div class="card-name" id="card-2-nome"></div>
                    <div class="card-status">
                        <span class="dot" id="card-2-dot"></span>
                        <span id="card-2-status"></span>
                    </div>
                    <div class="card-meta" id="card-2-meta"></div>
                    <div class="card-meta" id="card-2-local"></div>
                    <div class="btn-learn">
                        <button id="card-2-btn">LEARN MORE</button>
                    </div>
                </div>
            </div>

        </div>

        <div id="paginacao" class="paginacao"></div>

    </main>

    <!-- Modal de detalhes -->
    <div id="modal-overlay" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <button id="modal-fechar" class="modal-fechar">&times;</button>
            <img id="modal-img" src="" alt="">
            <div class="modal-info">
                <h2 id="modal-nome"></h2>
                <table class="modal-table">
                    <tr><td>Status</td><td id="modal-status"></td></tr>
                    <tr><td>Espécie</td><td id="modal-especie"></td></tr>
                    <tr><td>Gênero</td><td id="modal-genero"></td></tr>
                    <tr><td>Origem</td><td id="modal-origem"></td></tr>
                    <tr><td>Local atual</td><td id="modal-local"></td></tr>
                    <tr><td>Episódios</td><td id="modal-eps"></td></tr>
                </table>
            </div>
        </div>
    </div>

</body>
</html>
